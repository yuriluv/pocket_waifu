name: Android Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name (semver, e.g. 1.2.3)
        required: true
        type: string
      artifact_retention_days:
        description: Artifact retention days
        required: false
        default: "30"
        type: string
      allow_cubism_fallback:
        description: Allow build without native Cubism SDK (not recommended)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="${{ inputs.version_name }}"
          fi

          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android signing inputs
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-${ANDROID_STORE_PASSWORD:-}}"

          missing=()
          [[ -z "${ANDROID_KEYSTORE_BASE64}" ]] && missing+=("ANDROID_KEYSTORE_BASE64")
          [[ -z "${KEYSTORE_PASSWORD}" ]] && missing+=("ANDROID_KEYSTORE_PASSWORD (or ANDROID_STORE_PASSWORD)")
          [[ -z "${ANDROID_KEY_ALIAS}" ]] && missing+=("ANDROID_KEY_ALIAS")
          [[ -z "${ANDROID_KEY_PASSWORD}" ]] && missing+=("ANDROID_KEY_PASSWORD")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Missing Android signing secrets (${missing[*]}). Falling back to debug signing."
            rm -f android/key.properties
            exit 0
          fi

          mkdir -p android/keystore
          if ! echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/keystore/release.keystore 2>/dev/null; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 decode failed. Falling back to debug signing."
            rm -f android/key.properties android/keystore/release.keystore
            exit 0
          fi

          cat > android/key.properties <<EOF
          storeFile=keystore/release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Prepare local.properties for Cubism SDK
        id: cubism
        shell: bash
        env:
          CUBISM_SDK_PATH: ${{ secrets.CUBISM_SDK_PATH }}
          CUBISM_SDK_ZIP_BASE64: ${{ secrets.CUBISM_SDK_ZIP_BASE64 }}
          CUBISM_SDK_DOWNLOAD_URL: ${{ secrets.CUBISM_SDK_DOWNLOAD_URL }}
          ALLOW_CUBISM_FALLBACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_cubism_fallback || 'false' }}
        run: |
          set -euo pipefail

          RESOLVED_CUBISM_PATH=""

          if [[ -n "${CUBISM_SDK_PATH}" ]]; then
            RESOLVED_CUBISM_PATH="${CUBISM_SDK_PATH}"
          elif [[ -n "${CUBISM_SDK_ZIP_BASE64}" ]]; then
            mkdir -p "$RUNNER_TEMP/cubism-sdk"
            echo "${CUBISM_SDK_ZIP_BASE64}" | base64 --decode > "$RUNNER_TEMP/cubism-sdk/cubism.zip"
            unzip -q "$RUNNER_TEMP/cubism-sdk/cubism.zip" -d "$RUNNER_TEMP/cubism-sdk/unpacked"
            RESOLVED_CUBISM_PATH=$(find "$RUNNER_TEMP/cubism-sdk/unpacked" -mindepth 1 -maxdepth 3 -type d | head -n 1)
          elif [[ -n "${CUBISM_SDK_DOWNLOAD_URL}" ]]; then
            mkdir -p "$RUNNER_TEMP/cubism-sdk"
            curl -fsSL "${CUBISM_SDK_DOWNLOAD_URL}" -o "$RUNNER_TEMP/cubism-sdk/cubism.zip"
            unzip -q "$RUNNER_TEMP/cubism-sdk/cubism.zip" -d "$RUNNER_TEMP/cubism-sdk/unpacked"
            RESOLVED_CUBISM_PATH=$(find "$RUNNER_TEMP/cubism-sdk/unpacked" -mindepth 1 -maxdepth 3 -type d | head -n 1)
          fi

          if [[ -n "${RESOLVED_CUBISM_PATH}" && ! -d "${RESOLVED_CUBISM_PATH}/Core" ]]; then
            CANDIDATE_CORE=$(find "${RESOLVED_CUBISM_PATH}" -maxdepth 4 -type d -name Core | head -n 1 || true)
            if [[ -n "${CANDIDATE_CORE}" ]]; then
              RESOLVED_CUBISM_PATH=$(dirname "${CANDIDATE_CORE}")
            fi
          fi

          if [[ -z "${RESOLVED_CUBISM_PATH}" || ! -d "${RESOLVED_CUBISM_PATH}/Core" ]]; then
            echo "cubism_native_enabled=false" >> "${GITHUB_OUTPUT}"
            rm -f android/local.properties

            if [[ "${ALLOW_CUBISM_FALLBACK}" == "true" ]]; then
              echo "::notice::Cubism SDK missing/invalid; continuing without native Cubism integration by explicit override."
              exit 0
            fi

            echo "::error::Cubism SDK is missing/invalid. Set CUBISM_SDK_PATH or CUBISM_SDK_ZIP_BASE64 (with Core/) or run workflow with allow_cubism_fallback=true."
            exit 1
          fi

          echo "cubism_native_enabled=true" >> "${GITHUB_OUTPUT}"

          cat > android/local.properties <<EOF
          cubism.sdk.path=${RESOLVED_CUBISM_PATH}
          EOF

      - name: Build signed release APK
        env:
          LOG_INGEST_ENDPOINT: ${{ secrets.LOG_INGEST_ENDPOINT }}
          LOG_INGEST_TOKEN: ${{ secrets.LOG_INGEST_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          LOG_UPLOAD_ENABLED=false
          if [[ -n "${LOG_INGEST_ENDPOINT}" ]]; then
            LOG_UPLOAD_ENABLED=true
          fi

          flutter build apk \
            --release \
            --build-name "${{ steps.version.outputs.version_name }}" \
            --build-number "${{ steps.version.outputs.version_code }}" \
            --dart-define=LOG_UPLOAD_ENABLED=${LOG_UPLOAD_ENABLED} \
            --dart-define=LOG_ENDPOINT="${LOG_INGEST_ENDPOINT}" \
            --dart-define=LOG_AUTH_TOKEN="${LOG_INGEST_TOKEN}" \
            --dart-define=CUBISM_NATIVE_ENABLED=${{ steps.cubism.outputs.cubism_native_enabled }}

      - name: Generate checksum and SBOM
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          mkdir -p build/release
          sha256sum "${APK_PATH}" > build/release/app-release.apk.sha256
          flutter pub deps --json > build/release/flutter_pub_deps.sbom.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pocket-waifu-android-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}
          retention-days: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_retention_days || 30 }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/release/app-release.apk.sha256
            build/release/flutter_pub_deps.sbom.json


      - name: Publish GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/release/app-release.apk.sha256
            build/release/flutter_pub_deps.sbom.json
