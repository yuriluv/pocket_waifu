<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live2D Viewer</title>
    <style>
        /* 기본 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        /* 캔버스 */
        #live2d-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 로딩 화면 */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 에러 화면 */
        #error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 101;
        }

        #error.visible {
            display: flex;
        }

        #error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        #error-message {
            font-size: 12px;
            max-width: 280px;
            line-height: 1.5;
            word-break: break-all;
        }

        /* 디버그 정보 */
        #debug {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            border-radius: 4px;
            max-height: 100px;
            overflow-y: auto;
            z-index: 200;
            display: none;
        }

        #debug.visible {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Live2D 캔버스 -->
    <canvas id="live2d-canvas"></canvas>

    <!-- 로딩 화면 -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">모델 로딩 중...</p>
    </div>

    <!-- 에러 화면 -->
    <div id="error">
        <div id="error-icon">⚠️</div>
        <p id="error-message">모델을 불러올 수 없습니다.</p>
    </div>

    <!-- 디버그 정보 -->
    <div id="debug"></div>

    <!-- Live2D SDK -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
        (function() {
            'use strict';

            // 전역 변수
            let app = null;
            let currentModel = null;
            let debugMode = false;

            // DOM 요소
            const canvas = document.getElementById('live2d-canvas');
            const loadingEl = document.getElementById('loading');
            const loadingTextEl = document.getElementById('loading-text');
            const errorEl = document.getElementById('error');
            const errorMsgEl = document.getElementById('error-message');
            const debugEl = document.getElementById('debug');

            // 디버그 로그
            function log(message, data) {
                const timestamp = new Date().toISOString().substr(11, 12);
                const logLine = `[${timestamp}] ${message}`;
                console.log(logLine, data || '');
                
                if (debugMode) {
                    debugEl.innerHTML = logLine + '<br>' + debugEl.innerHTML;
                    if (debugEl.children.length > 50) {
                        debugEl.lastChild.remove();
                    }
                }

                // Flutter로 로그 전송
                sendToFlutter({ type: 'log', message: message, data: data });
            }

            // Flutter로 메시지 전송
            function sendToFlutter(data) {
                try {
                    if (window.FlutterChannel) {
                        window.FlutterChannel.postMessage(JSON.stringify(data));
                    }
                } catch (e) {
                    console.error('Flutter 전송 실패:', e);
                }
            }

            // 초기화
            async function init() {
                log('초기화 시작');
                log('URL: ' + window.location.href);

                try {
                    // SDK 체크
                    if (typeof Live2DCubismCore === 'undefined') {
                        throw new Error('Live2DCubismCore 로드 실패. 네트워크 확인.');
                    }
                    log('Cubism Core OK');

                    if (typeof PIXI === 'undefined') {
                        throw new Error('PixiJS 로드 실패.');
                    }
                    log('PixiJS OK: ' + PIXI.VERSION);

                    if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
                        throw new Error('pixi-live2d-display 로드 실패.');
                    }
                    log('pixi-live2d-display OK');

                    // PixiJS 앱 생성
                    app = new PIXI.Application({
                        view: canvas,
                        autoStart: true,
                        backgroundAlpha: 0,
                        resizeTo: window,
                    });
                    log('PixiJS App 생성 완료');

                    // URL 파라미터에서 모델 경로 가져오기
                    const params = new URLSearchParams(window.location.search);
                    const modelPath = params.get('model');
                    
                    log('모델 파라미터: ' + modelPath);

                    if (!modelPath) {
                        loadingTextEl.textContent = '모델 경로 대기 중...';
                        log('모델 경로 없음 - 대기');
                        return;
                    }

                    // 모델 로드
                    await loadModel(modelPath);

                    // 이벤트 리스너
                    window.addEventListener('resize', onResize);
                    canvas.addEventListener('pointerdown', onTap);

                } catch (e) {
                    log('초기화 실패: ' + e.message);
                    showError('초기화 실패: ' + e.message);
                    sendToFlutter({ type: 'error', message: e.message });
                }
            }

            // 모델 로드
            async function loadModel(modelPath) {
                log('모델 로드 시작: ' + modelPath);
                showLoading('모델 로딩 중...');

                try {
                    // 기존 모델 제거
                    if (currentModel) {
                        log('기존 모델 제거');
                        app.stage.removeChild(currentModel);
                        currentModel.destroy();
                        currentModel = null;
                    }

                    // 상대 경로면 origin 추가
                    let fullPath = modelPath;
                    if (modelPath.startsWith('/')) {
                        fullPath = window.location.origin + modelPath;
                    }
                    log('전체 경로: ' + fullPath);

                    // 모델 로드
                    loadingTextEl.textContent = '모델 파일 다운로드 중...';
                    currentModel = await PIXI.live2d.Live2DModel.from(fullPath);
                    log('모델 객체 생성 완료');

                    // 스테이지에 추가
                    app.stage.addChild(currentModel);
                    log('스테이지 추가 완료');

                    // 크기/위치 조정
                    fitModel();

                    // 인터랙티브 설정
                    currentModel.interactive = true;

                    log('모델 로드 완료!');
                    hideLoading();
                    sendToFlutter({ type: 'loaded', path: modelPath });

                } catch (e) {
                    log('모델 로드 실패: ' + e.message);
                    showError('모델 로드 실패:\n' + e.message + '\n\n경로: ' + modelPath);
                    sendToFlutter({ type: 'error', message: e.message, path: modelPath });
                }
            }

            // 모델 크기 조정
            function fitModel() {
                if (!currentModel || !app) return;

                const sw = app.screen.width;
                const sh = app.screen.height;
                const mw = currentModel.width;
                const mh = currentModel.height;

                const scale = Math.min(sw / mw, sh / mh) * 0.9;
                currentModel.scale.set(scale);

                currentModel.x = (sw - mw * scale) / 2;
                currentModel.y = (sh - mh * scale) / 2;

                log('모델 크기 조정: scale=' + scale.toFixed(2));
            }

            // 리사이즈
            function onResize() {
                if (app) {
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    fitModel();
                }
            }

            // 탭
            function onTap(e) {
                if (!currentModel) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                log('탭: (' + x + ', ' + y + ')');
                sendToFlutter({ type: 'tap', x: x, y: y });

                try {
                    currentModel.tap(x, y);
                } catch (err) {
                    log('탭 모션 없음');
                }
            }

            // UI 함수
            function showLoading(text) {
                loadingTextEl.textContent = text || '로딩 중...';
                loadingEl.classList.remove('hidden');
                errorEl.classList.remove('visible');
            }

            function hideLoading() {
                loadingEl.classList.add('hidden');
            }

            function showError(message) {
                hideLoading();
                errorMsgEl.textContent = message;
                errorEl.classList.add('visible');
            }

            // 외부 API
            window.Live2DViewer = {
                loadModel: function(path) {
                    loadModel(path);
                },
                playMotion: function(group, index) {
                    if (currentModel) {
                        try {
                            currentModel.motion(group, index);
                            log('모션 재생: ' + group + '[' + index + ']');
                        } catch (e) {
                            log('모션 실패: ' + e.message);
                        }
                    }
                },
                setExpression: function(name) {
                    if (currentModel) {
                        try {
                            currentModel.expression(name);
                            log('표정 설정: ' + name);
                        } catch (e) {
                            log('표정 실패: ' + e.message);
                        }
                    }
                },
                setScale: function(scale) {
                    if (currentModel) {
                        currentModel.scale.set(scale);
                        log('스케일 설정: ' + scale);
                    }
                },
                toggleDebug: function() {
                    debugMode = !debugMode;
                    debugEl.classList.toggle('visible', debugMode);
                    log('디버그 모드: ' + debugMode);
                },
                getStatus: function() {
                    return {
                        hasModel: currentModel !== null,
                        isLoading: !loadingEl.classList.contains('hidden'),
                        hasError: errorEl.classList.contains('visible'),
                        debugMode: debugMode
                    };
                }
            };

            // 시작
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
