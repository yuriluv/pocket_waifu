<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live2D Viewer v3.0 (Kotlin Server)</title>
    <style>
        /* ===== 기본 스타일 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        /* ===== 캔버스 스타일 ===== */
        #live2d-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ===== 로딩 화면 ===== */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading-text {
            font-size: 14px;
            margin-bottom: 8px;
        }

        #loading-detail {
            font-size: 11px;
            opacity: 0.7;
            max-width: 280px;
            text-align: center;
            word-break: break-all;
        }

        /* ===== 에러 화면 ===== */
        #error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: #ff6b6b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 101;
        }

        #error.visible {
            display: flex;
        }

        #error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        #error-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        #error-message {
            font-size: 12px;
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: #ccc;
        }

        #error-detail {
            font-size: 10px;
            max-width: 300px;
            color: #888;
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }

        #retry-btn {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #retry-btn:hover {
            background: #3a8eef;
        }
    </style>
</head>
<body>
    <!-- Live2D 캔버스 -->
    <canvas id="live2d-canvas"></canvas>

    <!-- 로딩 화면 -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">초기화 중...</p>
        <p id="loading-detail"></p>
    </div>

    <!-- 에러 화면 -->
    <div id="error">
        <div id="error-icon">⚠️</div>
        <p id="error-title">모델 로드 실패</p>
        <p id="error-message">모델을 불러올 수 없습니다.</p>
        <p id="error-detail"></p>
        <button id="retry-btn" onclick="retryLoad()">다시 시도</button>
    </div>

    <!-- ============================================== -->
    <!-- Live2D Cubism 4 스크립트 로드 (순서 중요!) -->
    <!-- ============================================== -->
    
    <!-- 1. Cubism 4 Core (필수! - 반드시 먼저 로드) -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    
    <!-- 2. PixiJS (렌더링 엔진) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    
    <!-- 3. pixi-live2d-display (Cubism 4 지원 버전) -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <script>
        // ===================================================================
        // Live2D Viewer v3.0 (Kotlin 네이티브 서버)
        // ===================================================================
        // v3.0 변경사항:
        // - Kotlin 네이티브 HTTP 서버 지원
        // - URL 스킴: http://localhost:8080/models/... (외부 저장소)
        // - URL 스킴: http://localhost:8080/assets/... (앱 내장 에셋)
        // - 향상된 URL 디코딩 (한글, 공백 처리)
        // - 상세한 오류 처리 및 디버그 로깅
        // ===================================================================

        (function() {
            'use strict';

            // === 상수 ===
            const SERVER_URL = 'http://localhost:8080';
            const MODELS_PREFIX = '/models/';
            const ASSETS_PREFIX = '/assets/';
            const MAX_TEXTURE_SIZE = 2048;  // WebGL 안전 텍스처 크기

            // === 전역 변수 ===
            let app = null;
            let currentModel = null;
            let currentModelPath = null;
            let loadRetryCount = 0;
            const MAX_RETRY = 3;

            // === 이미지 리사이즈 함수 (큰 텍스처 처리) ===
            function resizeImage(image, maxSize) {
                const { width, height } = image;
                
                if (width <= maxSize && height <= maxSize) {
                    return image;  // 리사이즈 불필요
                }
                
                console.log(`[Live2D] 텍스처 리사이즈: ${width}x${height} -> max ${maxSize}`);
                
                const scale = Math.min(maxSize / width, maxSize / height);
                const newWidth = Math.floor(width * scale);
                const newHeight = Math.floor(height * scale);
                
                const canvas = document.createElement('canvas');
                canvas.width = newWidth;
                canvas.height = newHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0, newWidth, newHeight);
                
                console.log(`[Live2D] 리사이즈 완료: ${newWidth}x${newHeight}`);
                
                return canvas;
            }

            // === DOM 요소 ===
            const canvas = document.getElementById('live2d-canvas');
            const loadingEl = document.getElementById('loading');
            const loadingTextEl = document.getElementById('loading-text');
            const loadingDetailEl = document.getElementById('loading-detail');
            const errorEl = document.getElementById('error');
            const errorTitleEl = document.getElementById('error-title');
            const errorMsgEl = document.getElementById('error-message');
            const errorDetailEl = document.getElementById('error-detail');

            // === 유틸리티: 안전한 URL 디코딩 (다중 인코딩 처리) ===
            function safeDecodeURI(str) {
                if (!str) return str;
                try {
                    let decoded = str;
                    // 최대 5회까지 디코딩 시도 (다중 인코딩된 경우)
                    for (let i = 0; i < 5; i++) {
                        const newDecoded = decodeURIComponent(decoded);
                        if (newDecoded === decoded) break;
                        decoded = newDecoded;
                    }
                    return decoded;
                } catch (e) {
                    console.warn('[Live2D] URL 디코딩 실패:', e);
                    return str;
                }
            }

            // === URL 처리: 모델 URL 정규화 ===
            function normalizeModelUrl(modelParam) {
                console.log('[Live2D] === URL 정규화 시작 ===');
                console.log('[Live2D] 입력값:', modelParam);
                
                // 디코딩
                let decoded = safeDecodeURI(modelParam);
                console.log('[Live2D] 디코딩 후:', decoded);
                
                // 이미 완전한 URL인 경우 (http:// 또는 https://)
                if (decoded.startsWith('http://') || decoded.startsWith('https://')) {
                    console.log('[Live2D] 이미 완전한 URL');
                    return decoded;
                }
                
                // 현재 origin 사용 (localhost:8080)
                const baseUrl = window.location.origin || SERVER_URL;
                
                // /models/... 로 시작하면 그대로 사용
                if (decoded.startsWith(MODELS_PREFIX)) {
                    const fullUrl = baseUrl + decoded;
                    console.log('[Live2D] models 경로:', fullUrl);
                    return fullUrl;
                }
                
                // /assets/... 로 시작하면 그대로 사용
                if (decoded.startsWith(ASSETS_PREFIX)) {
                    const fullUrl = baseUrl + decoded;
                    console.log('[Live2D] assets 경로:', fullUrl);
                    return fullUrl;
                }
                
                // / 로 시작하는 기타 경로
                if (decoded.startsWith('/')) {
                    const fullUrl = baseUrl + decoded;
                    console.log('[Live2D] 절대 경로:', fullUrl);
                    return fullUrl;
                }
                
                // 상대 경로 (models/ 없이 시작)
                // models/ 접두어 추가
                const fullUrl = baseUrl + MODELS_PREFIX + decoded;
                console.log('[Live2D] 상대 경로 -> models 추가:', fullUrl);
                return fullUrl;
            }

            // === 초기화 ===
            async function init() {
                console.log('[Live2D] ==========================================');
                console.log('[Live2D] Live2D Viewer v3.0 (Kotlin 서버)');
                console.log('[Live2D] ==========================================');
                console.log('[Live2D] 현재 URL:', window.location.href);
                console.log('[Live2D] Origin:', window.location.origin);

                updateLoading('라이브러리 확인 중...');

                try {
                    // === 1. Cubism Core 로드 확인 ===
                    if (typeof Live2DCubismCore === 'undefined') {
                        throw new Error('Live2DCubismCore가 로드되지 않았습니다.\n네트워크 연결을 확인하세요.');
                    }
                    const coreVersion = Live2DCubismCore.Version.csmGetVersion();
                    console.log('[Live2D] ✅ Cubism Core 버전:', formatVersion(coreVersion));

                    // === 2. PixiJS 확인 ===
                    if (typeof PIXI === 'undefined') {
                        throw new Error('PixiJS가 로드되지 않았습니다.');
                    }
                    console.log('[Live2D] ✅ PixiJS 버전:', PIXI.VERSION);

                    // === 3. pixi-live2d-display 확인 ===
                    if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
                        throw new Error('pixi-live2d-display가 로드되지 않았습니다.');
                    }
                    console.log('[Live2D] ✅ pixi-live2d-display 로드됨');

                    updateLoading('렌더러 생성 중...');

                    // === 4. PixiJS 앱 생성 ===
                    app = new PIXI.Application({
                        view: canvas,
                        autoStart: true,
                        backgroundAlpha: 0,
                        resizeTo: window,
                        antialias: true,
                    });

                    // WebGL 텍스처 크기 제한 완화 설정
                    // 모바일 기기에서 큰 텍스처 지원을 위해
                    if (app.renderer && app.renderer.gl) {
                        const gl = app.renderer.gl;
                        const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
                        console.log('[Live2D] WebGL 최대 텍스처 크기:', maxTextureSize);
                    }

                    // pixi-live2d-display 텍스처 설정
                    // 큰 텍스처를 위한 mipmap 비활성화
                    PIXI.settings.MIPMAP_TEXTURES = PIXI.MIPMAP_MODES.OFF;
                    PIXI.BaseTexture.defaultOptions.mipmap = PIXI.MIPMAP_MODES.OFF;
                    
                    // 텍스처 스케일 모드 설정 (부드러운 축소)
                    PIXI.settings.SCALE_MODE = PIXI.SCALE_MODES.LINEAR;

                    // === 텍스처 리사이즈 미들웨어 (중요!) ===
                    // 큰 텍스처를 자동으로 리사이즈
                    PIXI.Assets.setPreferences({
                        preferCreateImageBitmap: false,  // ImageBitmap 대신 Image 사용
                    });
                    
                    // BaseTexture 생성 시 리사이즈 적용
                    const originalBaseTextureFrom = PIXI.BaseTexture.from;
                    PIXI.BaseTexture.from = function(source, options) {
                        if (source instanceof HTMLImageElement) {
                            const { width, height } = source;
                            if (width > MAX_TEXTURE_SIZE || height > MAX_TEXTURE_SIZE) {
                                console.log(`[Live2D] 큰 텍스처 감지: ${width}x${height}`);
                                source = resizeImage(source, MAX_TEXTURE_SIZE);
                            }
                        }
                        return originalBaseTextureFrom.call(this, source, options);
                    };

                    console.log('[Live2D] ✅ PixiJS Application 생성 완료');
                    console.log('[Live2D] 텍스처 최대 크기 제한:', MAX_TEXTURE_SIZE);

                    // === 5. URL에서 모델 경로 가져오기 ===
                    const params = new URLSearchParams(window.location.search);
                    let modelParam = params.get('model');

                    console.log('[Live2D] URL 파라미터 model (원본):', modelParam);

                    if (!modelParam) {
                        console.warn('[Live2D] model 파라미터 없음');
                        showError(
                            '모델 경로 없음', 
                            '모델 경로가 지정되지 않았습니다.', 
                            'URL에 ?model=... 파라미터를 추가하세요.\n\n' +
                            '예시:\n' +
                            window.location.origin + '/?model=/models/MyModel/model.model3.json'
                        );
                        return;
                    }

                    // URL 정규화
                    const fullModelUrl = normalizeModelUrl(modelParam);
                    console.log('[Live2D] 최종 모델 URL:', fullModelUrl);

                    currentModelPath = fullModelUrl;
                    await loadModel(fullModelUrl);

                    // === 6. 이벤트 리스너 설정 ===
                    window.addEventListener('resize', onResize);
                    canvas.addEventListener('pointerdown', onTap);

                    console.log('[Live2D] ========== 초기화 완료 ==========');

                } catch (e) {
                    console.error('[Live2D] ❌ 초기화 실패:', e);
                    showError('초기화 실패', e.message, e.stack);
                }
            }

            // === 모델 로드 ===
            async function loadModel(modelPath) {
                console.log('[Live2D] ========== 모델 로딩 시작 ==========');
                console.log('[Live2D] 모델 경로:', modelPath);
                
                updateLoading('모델 로딩 중...', modelPath);

                try {
                    // 기존 모델 제거
                    if (currentModel) {
                        console.log('[Live2D] 기존 모델 제거');
                        app.stage.removeChild(currentModel);
                        currentModel.destroy();
                        currentModel = null;
                    }

                    // === 모델 파일 사전 검증 ===
                    updateLoading('모델 파일 확인 중...', modelPath);
                    
                    try {
                        const checkResponse = await fetch(modelPath, { method: 'HEAD' });
                        if (!checkResponse.ok) {
                            throw new Error(`모델 파일 접근 실패: HTTP ${checkResponse.status}`);
                        }
                        console.log('[Live2D] ✅ 모델 파일 존재 확인');
                    } catch (fetchError) {
                        console.warn('[Live2D] HEAD 요청 실패, 직접 로드 시도:', fetchError.message);
                    }

                    // === Live2D 모델 로드 ===
                    updateLoading('Live2D 모델 파싱 중...', modelPath);
                    
                    console.log('[Live2D] PIXI.live2d.Live2DModel.from() 호출...');
                    
                    // 텍스처 리사이즈 미들웨어 설정 (4096 초과 시 축소)
                    const maxTextureSize = 4096;
                    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker.shared);
                    
                    // 커스텀 텍스처 로더 설정
                    const originalFrom = PIXI.live2d.Live2DModel.from;
                    
                    currentModel = await PIXI.live2d.Live2DModel.from(modelPath, {
                        autoInteract: true,
                        autoUpdate: true,
                        // 텍스처 옵션
                        textureOptions: {
                            mipmap: PIXI.MIPMAP_MODES.OFF,
                            scaleMode: PIXI.SCALE_MODES.LINEAR,
                        },
                    });

                    console.log('[Live2D] ✅ 모델 로드 성공!');
                    console.log('[Live2D] 모델 크기:', currentModel.width, 'x', currentModel.height);

                    // 스테이지에 추가
                    app.stage.addChild(currentModel);

                    // 모델 크기 및 위치 조정
                    fitModel();

                    // 인터랙티브 설정
                    currentModel.interactive = true;

                    // 성공 - 재시도 카운트 리셋
                    loadRetryCount = 0;

                    hideLoading();
                    console.log('[Live2D] ========== 모델 로딩 완료 ==========');

                } catch (e) {
                    console.error('[Live2D] ❌ 모델 로드 실패:', e);
                    
                    let errorTitle = '모델 로드 실패';
                    let errorMessage = e.message;
                    
                    if (e.message.includes('fetch') || e.message.includes('network')) {
                        errorTitle = '네트워크 오류';
                        errorMessage = '모델 파일을 다운로드할 수 없습니다.\n서버 연결을 확인하세요.';
                    } else if (e.message.includes('JSON') || e.message.includes('parse')) {
                        errorTitle = '모델 파일 오류';
                        errorMessage = '모델 파일 형식이 올바르지 않습니다.';
                    } else if (e.message.includes('texture') || e.message.includes('Texture')) {
                        errorTitle = '텍스처 로드 실패';
                        errorMessage = '텍스처 파일을 로드할 수 없습니다.';
                    } else if (e.message.includes('moc') || e.message.includes('Moc')) {
                        errorTitle = 'MOC 파일 오류';
                        errorMessage = 'MOC3 파일을 로드할 수 없습니다.';
                    }
                    
                    showError(errorTitle, errorMessage, `경로: ${modelPath}\n\n${e.stack || e.message}`);
                }
            }

            // === 모델 크기 조정 ===
            function fitModel() {
                if (!currentModel || !app) return;

                const stageWidth = app.screen.width;
                const stageHeight = app.screen.height;
                const modelWidth = currentModel.width;
                const modelHeight = currentModel.height;

                if (modelWidth === 0 || modelHeight === 0) {
                    console.warn('[Live2D] 모델 크기가 0입니다');
                    return;
                }

                const scale = Math.min(
                    stageWidth / modelWidth,
                    stageHeight / modelHeight
                ) * 0.85;

                currentModel.scale.set(scale);
                currentModel.x = (stageWidth - modelWidth * scale) / 2;
                currentModel.y = (stageHeight - modelHeight * scale) / 2;
            }

            // === 리사이즈 핸들러 ===
            function onResize() {
                if (app) {
                    app.renderer.resize(window.innerWidth, window.innerHeight);
                    fitModel();
                }
            }

            // === 터치/클릭 핸들러 ===
            function onTap(e) {
                if (!currentModel) return;

                const point = e.data?.global || { x: e.clientX, y: e.clientY };
                
                try {
                    currentModel.tap(point.x, point.y);
                } catch (err) {
                    // 탭 모션이 없는 경우 무시
                }
            }

            // === 로딩 상태 업데이트 ===
            function updateLoading(text, detail = '') {
                loadingTextEl.textContent = text;
                loadingDetailEl.textContent = detail;
                loadingEl.classList.remove('hidden');
                errorEl.classList.remove('visible');
            }

            function hideLoading() {
                loadingEl.classList.add('hidden');
            }

            // === 에러 표시 ===
            function showError(title, message, detail = '') {
                hideLoading();
                errorTitleEl.textContent = title;
                errorMsgEl.textContent = message;
                errorDetailEl.textContent = detail;
                errorDetailEl.style.display = detail ? 'block' : 'none';
                errorEl.classList.add('visible');
            }

            // === 재시도 ===
            window.retryLoad = function() {
                loadRetryCount++;
                console.log(`[Live2D] 재시도 ${loadRetryCount}/${MAX_RETRY}`);
                
                if (loadRetryCount > MAX_RETRY) {
                    showError('재시도 한도 초과', '최대 재시도 횟수를 초과했습니다.', '페이지를 새로고침해주세요.');
                    return;
                }
                
                errorEl.classList.remove('visible');
                
                if (currentModelPath) {
                    loadModel(currentModelPath);
                } else {
                    init();
                }
            };

            // === Cubism Core 버전 포맷팅 ===
            function formatVersion(version) {
                const major = (version >> 24) & 0xFF;
                const minor = (version >> 16) & 0xFF;
                const patch = version & 0xFFFF;
                return `${major}.${minor}.${patch}`;
            }

            // === 외부 API (Flutter에서 호출) ===
            window.Live2DViewer = {
                loadModel: function(path) {
                    currentModelPath = path;
                    loadModel(path);
                },
                
                playMotion: function(group, index) {
                    if (currentModel) {
                        try {
                            currentModel.motion(group, index);
                        } catch (e) {
                            console.warn('[Live2D] 모션 실행 실패:', e);
                        }
                    }
                },
                
                setExpression: function(name) {
                    if (currentModel) {
                        try {
                            currentModel.expression(name);
                        } catch (e) {
                            console.warn('[Live2D] 표정 설정 실패:', e);
                        }
                    }
                },

                setScale: function(scale) {
                    if (currentModel) {
                        currentModel.scale.set(scale);
                    }
                },

                getStatus: function() {
                    return {
                        hasModel: currentModel !== null,
                        isLoading: !loadingEl.classList.contains('hidden'),
                        hasError: errorEl.classList.contains('visible'),
                        modelPath: currentModelPath,
                    };
                },

                retry: function() {
                    window.retryLoad();
                }
            };

            // === 시작 ===
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
